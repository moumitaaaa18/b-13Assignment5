<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-96 text-center">

<!-- LOGO -->

<img
src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
class="w-16 mx-auto mb-3"
/>

<h1 class="text-2xl font-bold">
GitHub Issues Tracker
</h1>

<p class="text-gray-500 mb-6">
Sign in to manage your issues
</p>

<!-- FORM -->

<input
id="username"
type="text"
placeholder="Enter username"
class="border w-full p-2 mb-2 rounded"
/>

<p class="text-sm text-blue-500 mb-4">
Default: admin
</p>


<input
id="password"
type="password"
placeholder="Enter password"
class="border w-full p-2 mb-2 rounded"
/>

<p class="text-sm text-blue-500 mb-4">
Default: admin123
</p>


<div class="flex items-center mb-4 text-sm">

<input type="checkbox" class="mr-2">

Remember me

</div>


<button
onclick="loginUser()"
class="bg-blue-600 text-white w-full py-2 rounded hover:bg-blue-700">

Sign In

</button>


<div class="my-5 text-gray-400">OR</div>


<div class="text-sm text-gray-600">

<p class="font-semibold">Demo Credential</p>

<p>Username: admin</p>

<p>Password: admin123</p>

</div>

</div>



<script>

function loginUser(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

if(username==="admin" && password==="admin123"){

window.location.href="issues.html"

}else{

alert("Invalid credentials")

}

}

</script>

</body>

</html>
