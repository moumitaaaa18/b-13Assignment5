<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-white shadow p-4 flex justify-between items-center">

<div class="flex items-center gap-2">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="w-8">

<h1 class="font-bold text-lg">Issues Tracker</h1>

</div>

<div class="flex gap-2">

<input
type="text"
placeholder="Search issues..."
class="border rounded px-3 py-1"
/>

<button class="bg-blue-600 text-white px-4 py-1 rounded">
Search
</button>

</div>

</nav>


<!-- MAIN CONTAINER -->

<div class="max-w-6xl mx-auto p-4">

<!-- HEADER -->

<div class="flex justify-between items-center mb-6 flex-wrap gap-3">

<div>

<h2 class="text-2xl font-bold">All Issues</h2>

<p class="text-gray-500">Track and manage your project issues</p>

</div>

<!-- ISSUE COUNT -->

<div class="flex items-center gap-3">

<div class="bg-blue-100 text-blue-700 px-3 py-2 rounded font-bold">
50 Issues
</div>

</div>

</div>


<!-- TABS -->

<div class="flex gap-3 mb-6">

<button onclick="changeTab('all')" class="tab-btn bg-blue-600 text-white px-4 py-1 rounded">
All
</button>

<button onclick="changeTab('open')" class="tab-btn border px-4 py-1 rounded">
Open
</button>

<button onclick="changeTab('closed')" class="tab-btn border px-4 py-1 rounded">
Closed
</button>

</div>


<!-- ISSUES GRID -->

<div id="issuesList" class="grid md:grid-cols-2 gap-4"></div>

</div>


<script>

let issues = [

{
title:"Fix navigation menu on mobile devices",
desc:"The navigation menu does not collapse properly on mobile devices.",
type:"bug",
status:"open"
},

{
title:"Add dark mode support",
desc:"Users should be able to switch between light and dark themes.",
type:"enhancement",
status:"open"
},

{
title:"Update README with installation instructions",
desc:"The README file needs better instructions for new developers.",
type:"documentation",
status:"closed"
},

{
title:"Fix broken image uploads",
desc:"Users cannot upload images larger than 5MB.",
type:"bug",
status:"open"
},

{
title:"Add user authentication system",
desc:"Implement login and signup functionality.",
type:"enhancement",
status:"closed"
},

{
title:"Performance issues with large databases",
desc:"Loading becomes slow with more than 1000 items.",
type:"bug",
status:"open"
}

]


let currentTab = "all"


function changeTab(tab){

currentTab = tab

renderIssues()

}


function renderIssues(){

const list = document.getElementById("issuesList")

list.innerHTML = ""

let filtered = issues

if(currentTab === "open"){

filtered = issues.filter(i => i.status === "open")

}

if(currentTab === "closed"){

filtered = issues.filter(i => i.status === "closed")

}


filtered.forEach(issue => {

list.innerHTML += `

<div class="bg-white p-4 rounded shadow border-l-4 border-green-500">

<h3 class="font-bold text-lg">${issue.title}</h3>

<p class="text-gray-500 text-sm mb-3">${issue.desc}</p>

<div class="flex justify-between items-center">

<span class="text-xs bg-yellow-100 px-2 py-1 rounded">
${issue.type}
</span>

<span class="text-sm ${issue.status === "open" ? "text-green-600" : "text-blue-600"}">
${issue.status}
</span>

</div>

</div>

`

})

}

renderIssues()

</script>

</body>
</html>
